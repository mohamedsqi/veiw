<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Protein-Ligand Viewer</title>
    <script src="https://3Dmol.org/build/3Dmol-min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: white;
        }

        #controls {
            padding: 12px;
            background: #f5f5f5;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            border-bottom: 1px solid #ddd;
        }

        #viewer {
            width: 100%;
            height: 90vh;
        }

        button, select {
            padding: 8px 12px;
            border: none;
            background: #1976d2;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover, select:hover {
            background: #125aa0;
        }

        select {
            appearance: none;
        }

        #status {
            margin-left: auto;
            font-size: 14px;
            color: #333;
            background: transparent;
            padding: 4px 0;
        }

        .label {
            font-size: 14px;
            color: #222;
            font-weight: bold;
            margin-right: 4px;
        }
    </style>
</head>

<body>

<div id="controls">
    <span class="label">Structure:</span>
    <select id="structureSelect" onchange="changeStructure()">
        <option value="complex1.pdb">complex1.pdb</option>
        <option value="1a4l_protein.pdb">1a4l_protein.pdb</option>
    </select>

    <button onclick="toggleLigand()">Toggle Ligand</button>
    <button onclick="toggleProtein()">Toggle Protein</button>
    <button onclick="showPocket()">Pocket</button>
    <button onclick="showCartoon()">Cartoon</button>
    <button onclick="resetView()">Reset View</button>

    <span id="status">Loading...</span>
</div>

<div id="viewer"></div>

<script>
let viewer;
let currentFile = "complex1.pdb";
let ligandVisible = true;
let proteinVisible = true;

async function loadStructure(fileName) {
    document.getElementById("status").innerText = "Loading " + fileName + "...";

    currentFile = fileName;
    ligandVisible = true;
    proteinVisible = true;

    const res = await fetch("./" + fileName);
    const pdb = await res.text();

    if (viewer) {
        viewer.clear();
    } else {
        viewer = $3Dmol.createViewer("viewer", { backgroundColor: "white" });
    }

    viewer.addModel(pdb, "pdb");

    applyDefaultStyle();

    viewer.zoomTo();
    viewer.render();

    document.getElementById("status").innerText = fileName + " loaded";
}

function applyDefaultStyle() {
    viewer.setStyle({}, {});

    if (proteinVisible) {
        viewer.setStyle(
            {protein:true},
            {cartoon:{color:"#9ecae1"}}
        );
    }

    if (ligandVisible) {
        viewer.setStyle(
            {hetflag:true},
            {stick:{colorscheme:"cyanCarbon"}}
        );
    }

    viewer.setStyle(
        {protein:true, within:{distance:6, sel:{hetflag:true}}},
        {stick:{colorscheme:"magentaCarbon", radius:0.25}}
    );
}

function changeStructure() {
    const fileName = document.getElementById("structureSelect").value;
    loadStructure(fileName);
}

function toggleLigand() {
    ligandVisible = !ligandVisible;
    applyDefaultStyle();
    viewer.render();
}

function toggleProtein() {
    proteinVisible = !proteinVisible;
    applyDefaultStyle();
    viewer.render();
}

function showPocket() {
    viewer.setStyle({}, {});

    if (proteinVisible) {
        viewer.setStyle(
            {protein:true},
            {cartoon:{color:"#9ecae1", opacity:0.18}}
        );

        viewer.setStyle(
            {protein:true, within:{distance:8, sel:{hetflag:true}}},
            {stick:{colorscheme:"magentaCarbon", radius:0.25}}
        );
    }

    if (ligandVisible) {
        viewer.setStyle(
            {hetflag:true},
            {stick:{colorscheme:"cyanCarbon"}}
        );
    }

    viewer.zoomTo({hetflag:true});
    viewer.render();
}

function showCartoon() {
    applyDefaultStyle();
    viewer.zoomTo();
    viewer.render();
}

function resetView() {
    viewer.zoomTo();
    viewer.render();
}

loadStructure("complex1.pdb");
</script>

</body>
</html>
