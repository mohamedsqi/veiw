<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protein-Ligand Viewer</title>

<script src="https://3Dmol.org/build/3Dmol-min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f7fb;
}

.container {
    max-width: 1200px;
    margin: auto;
    padding: 20px;
}

.title {
    font-size: 28px;
    font-weight: bold;
}

.subtitle {
    color: #555;
    margin-bottom: 15px;
}

.panel {
    background: white;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.08);
    margin-bottom: 15px;
}

.controls button {
    margin: 5px;
    padding: 10px 14px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    background: #2563eb;
    color: white;
}

.controls button.secondary {
    background: #e5e7eb;
    color: black;
}

#viewer {
    width: 100%;
    height: 700px;
    border-radius: 12px;
}
</style>
</head>

<body>

<div class="container">

<div class="title">Protein-Ligand 3D Viewer</div>
<div class="subtitle">Interactive visualization of your docking result</div>

<div class="panel">
<div class="controls">
<button onclick="cartoon()">Cartoon</button>
<button onclick="surface()">Surface</button>
<button onclick="pocket()">Pocket</button>
<button class="secondary" onclick="toggleLigand()">Ligand ON/OFF</button>
<button class="secondary" onclick="toggleProtein()">Protein ON/OFF</button>
<button class="secondary" onclick="reset()">Reset</button>
</div>
<div id="status">Loading structure...</div>
</div>

<div id="viewer"></div>

</div>

<script>
let viewer;
let ligand = true;
let protein = true;

async function load() {

    let res = await fetch("./complex1.pdb");
    let pdb = await res.text();

    viewer = $3Dmol.createViewer("viewer", {backgroundColor:"white"});

    viewer.addModel(pdb,"pdb");

    style();

    viewer.zoomTo();
    viewer.render();

    document.getElementById("status").innerText = "Structure loaded";
}

function style(){
    viewer.setStyle({}, {});

    if(protein){
        viewer.setStyle({protein:true},{cartoon:{color:"lightgray"}});
    }

    if(ligand){
        viewer.setStyle({hetflag:true},{stick:{}});
    }
}

function cartoon(){
    viewer.removeAllSurfaces();
    style();
    viewer.render();
}

function surface(){
    viewer.removeAllSurfaces();
    viewer.setStyle({protein:true},{cartoon:{color:"lightgray"}});
    viewer.addSurface($3Dmol.SurfaceType.VDW,{opacity:0.7,color:"white"},{protein:true});
    viewer.setStyle({hetflag:true},{stick:{}});
    viewer.render();
}

function pocket(){
    viewer.removeAllSurfaces();

    viewer.setStyle({protein:true},{cartoon:{opacity:0.2}});
    viewer.setStyle(
        {protein:true, within:{distance:8, sel:{hetflag:true}}},
        {stick:{radius:0.2}}
    );

    viewer.setStyle({hetflag:true},{stick:{}});

    viewer.zoomTo({hetflag:true});
    viewer.render();
}

function toggleLigand(){
    ligand = !ligand;
    cartoon();
}

function toggleProtein(){
    protein = !protein;
    cartoon();
}

function reset(){
    viewer.zoomTo();
    viewer.render();
}

load();
</script>

</body>
</html>
