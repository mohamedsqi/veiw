<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Protein-Ligand Viewer</title>

    <script src="https://3Dmol.org/build/3Dmol-min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: white;
        }

        #viewer {
            width: 100%;
            height: 90vh;
        }

        #controls {
            padding: 10px;
            background: #f5f5f5;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        button {
            padding: 8px 12px;
            border: none;
            background: #1976d2;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #125aa0;
        }

        #status {
            margin-left: auto;
            font-size: 14px;
        }
    </style>
</head>

<body>

<div id="controls">
    <button onclick="toggleLigand()">Toggle Ligand</button>
    <button onclick="toggleProtein()">Toggle Protein</button>
    <button onclick="reset()">Reset View</button>
    <span id="status">Loading...</span>
</div>

<div id="viewer"></div>

<script>
let viewer;
let ligand = true;
let protein = true;

async function load() {

    let res = await fetch("./complex1.pdb");
    let pdb = await res.text();

    viewer = $3Dmol.createViewer("viewer", {backgroundColor:"white"});

    viewer.addModel(pdb,"pdb");

    // --- PROTEIN CARTOON ---
    viewer.setStyle(
        {protein:true},
        {cartoon:{color:"#9ecae1"}}
    );

    // --- LIGAND ---
    viewer.setStyle(
        {hetflag:true},
        {stick:{colorscheme:"cyanCarbon"}}
    );

    // --- POCKET ---
    viewer.setStyle(
        {protein:true, within:{distance:6, sel:{hetflag:true}}},
        {stick:{colorscheme:"magentaCarbon", radius:0.25}}
    );

    viewer.zoomTo({hetflag:true});
    viewer.render();

    document.getElementById("status").innerText = "Structure loaded";
}

function reset(){
    viewer.zoomTo();
    viewer.render();
}

function toggleLigand(){
    ligand = !ligand;
    viewer.setStyle({hetflag:true}, ligand ? {stick:{}} : {});
    viewer.render();
}

function toggleProtein(){
    protein = !protein;
    viewer.setStyle({protein:true}, protein ? {cartoon:{color:"#9ecae1"}} : {});
    viewer.render();
}

load();
</script>

</body>
</html>
